<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f5;
    --text: #222;
    --text-muted: #666;
    --text-hint: #888;
    --card-bg: #e0e0e0;
    --btn-bg: #fff;
    --btn-border: #bbb;
    --btn-border-hover: #888;
    --cell-bg: #d0d0d0;
    --cell-hover: #bcbcbc;
    --cell-revealed-bg: #f0f0f0;
    --cell-revealed-border: #ccc;
    --cell-exploded-bg: #f7a0a0;
    --cell-exploded-border: #e06060;
  }

  [data-theme="dark"] {
    --bg: #181a1b;
    --text: #eee;
    --text-muted: #aaa;
    --text-hint: #888;
    --card-bg: #2a2d2e;
    --btn-bg: #232627;
    --btn-border: #444;
    --btn-border-hover: #777;
    --cell-bg: #3a3d3e;
    --cell-hover: #4a4d4e;
    --cell-revealed-bg: #26292a;
    --cell-revealed-border: #3a3d3e;
    --cell-exploded-bg: #7a2e2e;
    --cell-exploded-border: #a53e3e;
  }

  #game {
    padding: 1.5rem; display: flex; flex-direction: column; align-items: center; gap: 1rem;
    font-family: sans-serif; background: var(--bg); min-height: 100vh; transition: background 0.2s;
  }
  h1 { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }

  #theme-toggle {
    border: 2px solid var(--btn-border); background: var(--btn-bg); border-radius: 20px;
    width: 42px; height: 26px; cursor: pointer; position: relative; padding: 0; flex-shrink: 0;
    transition: all 0.15s;
  }
  #theme-toggle:hover { border-color: var(--btn-border-hover); }
  #theme-toggle .knob {
    position: absolute; top: 1px; left: 1px; width: 18px; height: 18px; border-radius: 50%;
    background: var(--cell-bg); display: flex; align-items: center; justify-content: center;
    font-size: 11px; transition: left 0.15s;
  }
  [data-theme="dark"] #theme-toggle .knob { left: 19px; }

  #difficulty-bar { display: flex; gap: 8px; }
  .diff-btn { padding: 0.4rem 1rem; border-radius: 20px; border: 2px solid var(--btn-border); background: var(--btn-bg); font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-muted); transition: all 0.15s; }
  .diff-btn:hover { border-color: var(--btn-border-hover); color: var(--text); }
  .diff-btn.active.easy { background: #4caf50; border-color: #4caf50; color: #fff; }
  .diff-btn.active.medium { background: #ff9800; border-color: #ff9800; color: #fff; }
  .diff-btn.active.hard { background: #e53935; border-color: #e53935; color: #fff; }
  #topbar { display: flex; gap: 1rem; align-items: center; justify-content: center; }
  .stat-card { background: var(--card-bg); border-radius: 8px; padding: 0.45rem 1rem; display: flex; align-items: center; gap: 6px; font-size: 15px; font-weight: 500; color: var(--text); min-width: 70px; justify-content: center; }
  #reset-btn { background: var(--btn-bg); border: 1px solid var(--btn-border); border-radius: 8px; padding: 0.45rem 1rem; font-size: 14px; font-weight: 500; cursor: pointer; color: var(--text); transition: background 0.15s; }
  #reset-btn:hover { background: var(--card-bg); }

  #mode-bar { display: flex; gap: 10px; align-items: center; }
  #mode-label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
  #flag-btn { padding: 0.45rem 1.2rem; border-radius: 20px; border: 2px solid var(--btn-border); background: var(--btn-bg); font-size: 14px; font-weight: 700; cursor: pointer; color: var(--text-muted); transition: all 0.15s; }
  #flag-btn.active { background: #e91e8c; border-color: #e91e8c; color: #fff; }

  /* Em dispositivos com mouse (ponteiro fino), o botão direito já marca bandeira,
     então escondemos o toggle pra não poluir a interface */
  @media (pointer: fine) {
    #flag-btn { display: none; }
  }

  #board-wrapper { overflow-x: auto; max-width: 100%; }
  #board { display: grid; gap: 2px; }
  .cell { width: 36px; height: 36px; border-radius: 5px; border: 1px solid var(--btn-border); background: var(--cell-bg); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; transition: background 0.1s, transform 0.08s; user-select: none; color: var(--text); }
  .cell:hover:not(.revealed):not(.exploded) { background: var(--cell-hover); }
  .cell.revealed { background: var(--cell-revealed-bg); cursor: default; border-color: var(--cell-revealed-border); }
  .cell.flagged { background: var(--cell-bg); }
  .cell.exploded { background: var(--cell-exploded-bg); border-color: var(--cell-exploded-border); }
  .cell.mine-revealed { background: var(--cell-revealed-bg); }
  .n1 { color: #185FA5; } .n2 { color: #3B6D11; } .n3 { color: #A32D2D; }
  .n4 { color: #3C3489; } .n5 { color: #854F0B; } .n6 { color: #0F6E56; }
  .n7 { color: var(--text); } .n8 { color: var(--text-muted); }
  #message { font-size: 16px; font-weight: 600; color: var(--text); min-height: 24px; }
  #hint { font-size: 12px; color: var(--text-hint); }

  #ranking-btn { padding: 0.45rem 1.2rem; border-radius: 20px; border: 2px solid var(--btn-border); background: var(--btn-bg); font-size: 14px; font-weight: 700; cursor: pointer; color: var(--text-muted); transition: all 0.15s; }
  #ranking-btn:hover { border-color: var(--btn-border-hover); color: var(--text); }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex;
    align-items: center; justify-content: center; z-index: 1000; padding: 1rem;
  }
  .modal-box {
    background: var(--bg); border-radius: 12px; padding: 1.5rem; width: 100%; max-width: 380px;
    display: flex; flex-direction: column; gap: 1rem; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }
  .modal-box h2 { font-size: 18px; color: var(--text); }
  .modal-box input {
    padding: 0.6rem 0.8rem; border-radius: 8px; border: 1px solid var(--btn-border);
    background: var(--btn-bg); color: var(--text); font-size: 14px;
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btn { padding: 0.5rem 1.1rem; border-radius: 8px; border: 1px solid var(--btn-border); background: var(--btn-bg); color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; }
  .modal-btn.primary { background: #4caf50; border-color: #4caf50; color: #fff; }
  .modal-btn.primary:disabled { opacity: 0.6; cursor: default; }

  .rank-tabs { display: flex; gap: 6px; }
  .rank-tab { padding: 0.35rem 0.9rem; border-radius: 16px; border: 2px solid var(--btn-border); background: var(--btn-bg); font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-muted); }
  .rank-tab.active { background: #2196f3; border-color: #2196f3; color: #fff; }
  .rank-list { list-style: none; display: flex; flex-direction: column; gap: 4px; max-height: 320px; overflow-y: auto; }
  .rank-list li {
    display: flex; align-items: center; gap: 8px; padding: 0.4rem 0.6rem; border-radius: 6px;
    background: var(--card-bg); font-size: 14px; color: var(--text);
  }
  .rank-list .pos { font-weight: 700; width: 22px; text-align: center; color: var(--text-muted); }
  .rank-list .name { flex: 1; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rank-list .time { font-weight: 700; color: #2196f3; }
  .rank-empty { font-size: 13px; color: var(--text-hint); text-align: center; padding: 1rem 0; }
  .rank-loading { font-size: 13px; color: var(--text-hint); text-align: center; padding: 1rem 0; }
</style>

<div id="game">
  <h1>
    💣 Campo Minado
    <button id="theme-toggle" onclick="toggleTheme()" title="Alternar tema"><span class="knob">☀️</span></button>
  </h1>

  <div id="difficulty-bar">
    <button class="diff-btn easy active" onclick="setDifficulty('easy')">😊 Fácil</button>
    <button class="diff-btn medium" onclick="setDifficulty('medium')">😐 Médio</button>
    <button class="diff-btn hard" onclick="setDifficulty('hard')">💀 Difícil</button>
  </div>

  <div id="topbar">
    <div class="stat-card">💣 <span id="mine-count">10</span></div>
    <button id="reset-btn" onclick="initGame()">🔄 novo jogo</button>
    <div class="stat-card">⏱ <span id="timer">0</span>s</div>
  </div>

  <div id="mode-bar">
    <span id="mode-label">Modo:</span>
    <button id="flag-btn" onclick="toggleFlagMode()">🚩 Bandeira</button>
    <button id="ranking-btn" onclick="openRanking()">🏆 Ranking</button>
  </div>

  <div id="board-wrapper"><div id="board"></div></div>
  <div id="message"></div>
  <div id="hint">ative o modo bandeira para marcar minas 🚩</div>
</div>

<div id="name-modal-overlay" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h2>🎉 Novo tempo: <span id="name-modal-time"></span>s</h2>
    <input id="name-modal-input" type="text" placeholder="Seu nome" maxlength="20" />
    <div class="modal-actions">
      <button class="modal-btn" onclick="skipSaveScore()">Não salvar</button>
      <button class="modal-btn primary" id="save-score-btn" onclick="submitScore()">Salvar no ranking</button>
    </div>
  </div>
</div>

<div id="ranking-modal-overlay" class="modal-overlay" style="display:none;">
  <div class="modal-box" style="max-width: 420px;">
    <h2>🏆 Ranking — menores tempos</h2>
    <div class="rank-tabs">
      <button class="rank-tab easy active" onclick="switchRankingTab('easy')">😊 Fácil</button>
      <button class="rank-tab medium" onclick="switchRankingTab('medium')">😐 Médio</button>
      <button class="rank-tab hard" onclick="switchRankingTab('hard')">💀 Difícil</button>
    </div>
    <ul class="rank-list" id="rank-list"></ul>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeRanking()">Fechar</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, doc, getDoc, setDoc, query, where, orderBy, limit, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAywHghiWapg91-rBujX_JP-3q-_GHVHH4",
  authDomain: "campo-minado-d31bb.firebaseapp.com",
  projectId: "campo-minado-d31bb",
  storageBucket: "campo-minado-d31bb.firebasestorage.app",
  messagingSenderId: "215572040899",
  appId: "1:215572040899:web:13526227f066e8535aa676"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);

function slugify(name) {
  return name.toLowerCase().trim()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // remove acentos
    .replace(/[^a-z0-9]+/g, '_')
    .replace(/^_+|_+$/g, '')
    .slice(0, 40) || 'anonimo';
}

// Expõe pro escopo global, já que o resto do jogo usa scripts normais (não-módulo)
// Retorna: 'saved' (novo recorde salvo) ou 'not_better' (tempo anterior já era melhor ou igual)
window.__saveScore = async function(name, time, difficulty) {
  const docId = `${difficulty}__${slugify(name)}`;
  const ref = doc(db, "scores", docId);
  const existing = await getDoc(ref);

  if (existing.exists() && existing.data().time <= time) {
    return 'not_better';
  }

  await setDoc(ref, { name, time, difficulty, timestamp: Date.now() });
  return 'saved';
};

window.__loadRanking = async function(difficulty) {
  const q = query(
    collection(db, "scores"),
    where("difficulty", "==", difficulty),
    orderBy("time", "asc"),
    limit(10)
  );
  const snap = await getDocs(q);
  return snap.docs.map(d => d.data());
};
</script>

<script>
const DIFFICULTIES = {
  easy:   { rows: 9,  cols: 9,  mines: 10 },
  medium: { rows: 16, cols: 16, mines: 40 },
  hard:   { rows: 16, cols: 30, mines: 99 },
};

let currentDiff = 'easy';
let flagMode = false;
let ROWS, COLS, TOTAL_MINES;
let board, revealed, flagged, mineCount, gameOver, won, timerInterval, seconds, firstClick, startTime;

function toggleTheme() {
  const gameEl = document.getElementById('game');
  const isDark = gameEl.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  if (next === 'dark') {
    gameEl.setAttribute('data-theme', 'dark');
  } else {
    gameEl.removeAttribute('data-theme');
  }
  document.querySelector('#theme-toggle .knob').textContent = next === 'dark' ? '🌙' : '☀️';
}

function isDesktop() {
  return window.matchMedia('(pointer: fine)').matches;
}

function defaultHintText() {
  return isDesktop()
    ? 'clique com o botão direito para marcar/desmarcar uma bandeira 🚩'
    : 'ative o modo bandeira para marcar minas 🚩';
}

function toggleFlagMode() {
  flagMode = !flagMode;
  const btn = document.getElementById('flag-btn');
  btn.classList.toggle('active', flagMode);
  document.getElementById('hint').textContent = flagMode
    ? '🚩 Modo bandeira ativo — clique para marcar/desmarcar'
    : defaultHintText();
}

function setDifficulty(diff) {
  currentDiff = diff;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.diff-btn.${diff}`).classList.add('active');
  initGame();
}

function initGame() {
  const d = DIFFICULTIES[currentDiff];
  ROWS = d.rows; COLS = d.cols; TOTAL_MINES = d.mines;
  board    = Array.from({length: ROWS}, () => Array(COLS).fill(0));
  revealed = Array.from({length: ROWS}, () => Array(COLS).fill(false));
  flagged  = Array.from({length: ROWS}, () => Array(COLS).fill(false));
  mineCount = TOTAL_MINES;
  gameOver = false; won = false; seconds = 0; firstClick = true; flagMode = false;
  clearInterval(timerInterval);
  document.getElementById('timer').textContent = '0';
  document.getElementById('mine-count').textContent = mineCount;
  document.getElementById('message').textContent = '';
  document.getElementById('flag-btn').classList.remove('active');
  document.getElementById('hint').textContent = defaultHintText();
  document.getElementById('board').style.gridTemplateColumns = `repeat(${COLS}, 36px)`;
  renderBoard();
}

function placeMines(safeR, safeC) {
  let placed = 0;
  while (placed < TOTAL_MINES) {
    const r = Math.floor(Math.random() * ROWS);
    const c = Math.floor(Math.random() * COLS);
    if (board[r][c] !== -1 && !(Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1)) {
      board[r][c] = -1; placed++;
    }
  }
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    if (board[r][c] === -1) continue;
    let count = 0;
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
      const nr = r+dr, nc = c+dc;
      if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === -1) count++;
    }
    board[r][c] = count;
  }
}

function reveal(r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS || revealed[r][c] || flagged[r][c]) return;
  revealed[r][c] = true;
  if (board[r][c] === 0)
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) reveal(r+dr, c+dc);
}

function handleClick(r, c) {
  if (gameOver || revealed[r][c]) return;

  if (flagMode) {
    flagged[r][c] = !flagged[r][c];
    mineCount += flagged[r][c] ? -1 : 1;
    document.getElementById('mine-count').textContent = mineCount;
    renderBoard();
    return;
  }

  if (flagged[r][c]) return;

  if (firstClick) {
    firstClick = false;
    placeMines(r, c);
    startTime = Date.now();
    timerInterval = setInterval(() => {
      seconds++;
      document.getElementById('timer').textContent = seconds;
    }, 1000);
  }

  if (board[r][c] === -1) {
    revealed[r][c] = true;
    gameOver = true;
    clearInterval(timerInterval);
    revealAll(); renderBoard();
    document.getElementById('message').textContent = '💥 boom! você perdeu.';
    document.getElementById('hint').textContent = '';
    return;
  }
  reveal(r, c); renderBoard(); checkWin();
}

function handleRightClick(e, r, c) {
  e.preventDefault();
  if (gameOver || revealed[r][c]) return;
  flagged[r][c] = !flagged[r][c];
  mineCount += flagged[r][c] ? -1 : 1;
  document.getElementById('mine-count').textContent = mineCount;
  renderBoard();
}

function revealAll() {
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) revealed[r][c] = true;
}

function checkWin() {
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++)
    if (!revealed[r][c] && board[r][c] !== -1) return;
  won = true; gameOver = true;
  clearInterval(timerInterval);

  // Recalcula o tempo real com base no relógio do sistema, em vez de confiar
  // só no contador do setInterval (que pode ser interrompido via console)
  seconds = Math.round((Date.now() - startTime) / 1000);
  document.getElementById('timer').textContent = seconds;

  document.getElementById('message').textContent = '🎉 você venceu! parabéns!';
  document.getElementById('hint').textContent = '';
  openNameModal();
}

function openNameModal() {
  document.getElementById('name-modal-time').textContent = seconds;
  document.getElementById('name-modal-input').value = '';
  document.getElementById('name-modal-overlay').style.display = 'flex';
}

function skipSaveScore() {
  document.getElementById('name-modal-overlay').style.display = 'none';
}

async function submitScore() {
  const input = document.getElementById('name-modal-input');
  const name = input.value.trim();
  if (!name) { input.focus(); return; }

  const btn = document.getElementById('save-score-btn');
  btn.disabled = true;
  btn.textContent = 'Salvando...';

  try {
    const result = await window.__saveScore(name, seconds, currentDiff);
    if (result === 'not_better') {
      btn.textContent = 'Seu recorde já era melhor 😉';
      setTimeout(() => {
        document.getElementById('name-modal-overlay').style.display = 'none';
      }, 1400);
      return;
    }
    document.getElementById('name-modal-overlay').style.display = 'none';
  } catch (err) {
    console.error('Erro ao salvar pontuação:', err);
    btn.textContent = 'Erro — tentar de novo';
  } finally {
    btn.disabled = false;
    if (btn.textContent === 'Salvando...') btn.textContent = 'Salvar no ranking';
  }
}

let currentRankingTab = 'easy';

function openRanking() {
  document.getElementById('ranking-modal-overlay').style.display = 'flex';
  switchRankingTab(currentRankingTab);
}

function closeRanking() {
  document.getElementById('ranking-modal-overlay').style.display = 'none';
}

async function switchRankingTab(diff) {
  currentRankingTab = diff;
  document.querySelectorAll('.rank-tab').forEach(b => b.classList.remove('active'));
  document.querySelector(`.rank-tab.${diff}`).classList.add('active');

  const list = document.getElementById('rank-list');
  list.innerHTML = '<div class="rank-loading">carregando...</div>';

  try {
    const scores = await window.__loadRanking(diff);
    if (scores.length === 0) {
      list.innerHTML = '<div class="rank-empty">nenhum tempo registrado ainda — seja o primeiro!</div>';
      return;
    }
    const medals = ['🥇', '🥈', '🥉'];
    list.innerHTML = scores.map((s, i) => `
      <li>
        <span class="pos">${medals[i] || (i+1)}</span>
        <span class="name">${escapeHtml(s.name)}</span>
        <span class="time">${s.time}s</span>
      </li>
    `).join('');
  } catch (err) {
    console.error('Erro ao carregar ranking:', err);
    list.innerHTML = '<div class="rank-empty">não foi possível carregar o ranking agora.</div>';
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    const isRevealed = revealed[r][c], isFlagged = flagged[r][c], isMine = board[r][c] === -1;
    if (isRevealed) {
      if (isMine) {
        cell.classList.add(gameOver && !won ? 'exploded' : 'mine-revealed');
        cell.textContent = '💣';
      } else {
        cell.classList.add('revealed');
        const n = board[r][c];
        if (n > 0) { cell.textContent = n; cell.classList.add('n'+n); }
      }
    } else if (isFlagged) {
      cell.classList.add('flagged');
      cell.textContent = '🚩';
    }
    cell.addEventListener('click', () => handleClick(r, c));
    cell.addEventListener('contextmenu', e => handleRightClick(e, r, c));
    boardEl.appendChild(cell);
  }
}

initGame();
</script>
